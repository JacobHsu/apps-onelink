name: Deploy to GitHub Pages

# 部署後網址：
#   Nuxt App  → https://jacobhsu.github.io/apps-onelink/
#   投影片     → https://jacobhsu.github.io/apps-onelink/slides/

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # --- Nuxt App（根目錄）---
      - name: Install Nuxt dependencies
        run: pnpm install

      - name: Generate Nuxt static files
        run: pnpm run generate
        env:
          BASE_URL: /apps-onelink/

      # --- Slidev 投影片（/slides/ 子目錄）---
      - name: Install Slidev dependencies
        run: |
          cd slidev
          pnpm install

      - name: Build Slidev
        run: |
          cd slidev
          pnpm run build

      # --- 合併輸出 ---
      - name: Merge into one output
        run: cp -r slidev/dist .output/public/slides

      # --- 部署 ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
